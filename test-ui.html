<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIOS P0 — 测试控制台</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #7d8590;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --purple:    #bc8cff;
    --orange:    #ffa657;
    --radius:    8px;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Layout ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .tag {
    font-size: 11px;
    font-family: var(--font-mono);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    color: var(--muted);
  }

  .main { display: grid; grid-template-columns: 420px 1fr; height: calc(100vh - 53px); }

  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .output-pane {
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 10px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  .card-body { padding: 14px; }

  /* ── Health strip ── */
  .health-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.ok     { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.error  { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .dot.pulse  { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .health-text { font-size: 13px; flex: 1; }
  .health-meta { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }

  /* ── Form elements ── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #0d1117;
    border-color: var(--accent);
    width: 100%;
    justify-content: center;
  }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border-color: var(--border);
    width: 100%;
    justify-content: center;
  }
  .btn-ghost:hover:not(:disabled) { background: var(--bg3); border-color: var(--accent); color: var(--accent); }

  .btn-icon {
    padding: 5px 8px;
    background: var(--bg3);
    color: var(--muted);
    border-color: var(--border);
    font-size: 12px;
  }
  .btn-icon:hover { color: var(--text); background: var(--bg2); }

  .btn-row { display: flex; gap: 8px; }

  /* ── Badge ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
  }
  .badge-post   { background: #1a3a5c; color: var(--accent); }
  .badge-get    { background: #1a3d2a; color: var(--green); }
  .badge-accept { background: #1a3d2a; color: var(--green); }
  .badge-held   { background: #3d3010; color: var(--yellow); }
  .badge-rejected { background: #3d1010; color: var(--red); }

  /* ── Output panel ── */
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .output-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .method-tag {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
  }
  .method-post { background: #1a3a5c; color: var(--accent); }
  .method-get  { background: #1a3d2a; color: var(--green); }

  .url-tag {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
  }

  .timing { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }

  /* ── JSON viewer ── */
  .json-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .j-key    { color: var(--accent); }
  .j-str    { color: var(--green); }
  .j-num    { color: var(--orange); }
  .j-bool   { color: var(--purple); }
  .j-null   { color: var(--muted); }
  .j-brace  { color: var(--text); }

  /* ── Summary row ── */
  .summary {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg3);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .kv { display: flex; gap: 4px; align-items: center; }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text); font-weight: 600; }
  .kv .v.green { color: var(--green); }
  .kv .v.red   { color: var(--red); }
  .kv .v.yellow { color: var(--yellow); }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* ── Spinner ── */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 48px 24px;
    color: var(--muted);
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty .icon { font-size: 32px; opacity: 0.4; }
  .empty p { font-size: 13px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">LIOS <span>P0</span></div>
  <div class="tag">龙码协议</div>
  <div class="tag">localhost:3210</div>
  <div style="flex:1"></div>
  <div class="health-strip" id="healthStrip" style="padding:6px 12px;min-width:220px;">
    <div class="dot pulse" id="healthDot"></div>
    <div class="health-text" id="healthText">连接中…</div>
    <div class="health-meta" id="healthMeta"></div>
    <button class="btn btn-icon" onclick="fetchHealth()" title="刷新">↺</button>
  </div>
</header>

<div class="main">

  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <!-- POST /lios/run -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">POST /lios/run</span>
        <span class="badge badge-post">POST</span>
      </div>
      <div class="card-body">
        <div class="row field">
          <div>
            <label>tenant_id</label>
            <input id="f-tenant" value="acme" placeholder="acme">
          </div>
          <div>
            <label>session_id（留空自动生成）</label>
            <input id="f-session" placeholder="可选">
          </div>
        </div>
        <div class="field">
          <label>intent（意图描述）</label>
          <textarea id="f-intent" rows="3" placeholder="描述要执行的意图…">在生产环境部署 payment-service v2.5.0，需通过企业变更流程审批</textarea>
        </div>
        <div class="field">
          <label>context（JSON，可选）</label>
          <textarea id="f-context" rows="3" placeholder='{"env":"prod"}'>{
  "env": "prod",
  "service": "payment-service"
}</textarea>
        </div>
        <div class="field">
          <label style="color:var(--muted);font-size:11px;">测试用覆盖参数（写入 context）</label>
          <div class="row">
            <div>
              <label>_test_pack_score（0-1，强制 hold）</label>
              <input id="f-score" placeholder="留空=默认 0.85" type="number" min="0" max="1" step="0.01">
            </div>
            <div>
              <label>_test_force_l4（强制 reject）</label>
              <select id="f-l4">
                <option value="">否</option>
                <option value="true">true（pure-L4）</option>
              </select>
            </div>
          </div>
        </div>
        <button class="btn btn-primary" id="btnRun" onclick="runLios()">
          <span id="runIcon">▶</span> 执行 /lios/run
        </button>
      </div>
    </div>

    <hr class="divider">

    <!-- Plugin & Asset quick tests -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">快速测试</span>
      </div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:8px;">

        <div>
          <label>tenant_id（快速测试共用）</label>
          <input id="q-tenant" value="acme">
        </div>

        <div class="btn-row">
          <button class="btn btn-ghost" onclick="testPlugins()">
            <span class="badge badge-get" style="font-size:9px;">GET</span>
            /lios/plugins
          </button>
        </div>

        <div class="btn-row">
          <button class="btn btn-ghost" onclick="testAssets()">
            <span class="badge badge-get" style="font-size:9px;">GET</span>
            /lios/assets/search
          </button>
        </div>

        <hr class="divider">

        <!-- Plugin invoke shortcut -->
        <div>
          <label>Plugin ID（invoke 测试）</label>
          <input id="q-plugin-id" placeholder="粘贴 plugin UUID">
        </div>
        <div>
          <label>Prompt</label>
          <input id="q-plugin-prompt" value="分析此次部署的可行性与风险">
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="testPluginInvoke()">
            <span class="badge badge-post" style="font-size:9px;">POST</span>
            /lios/plugins/:id/invoke
          </button>
        </div>

        <hr class="divider">

        <!-- Asset ingest shortcut -->
        <div>
          <label>资产名称</label>
          <input id="q-asset-name" value="快速测试资产">
        </div>
        <div class="row">
          <div>
            <label>scope</label>
            <select id="q-asset-scope">
              <option value="enterprise">enterprise</option>
              <option value="project">project</option>
              <option value="task">task</option>
              <option value="industry">industry</option>
              <option value="role">role</option>
            </select>
          </div>
          <div>
            <label>asset_type</label>
            <select id="q-asset-type">
              <option value="knowledge">knowledge</option>
              <option value="policy">policy</option>
              <option value="document">document</option>
              <option value="template">template</option>
              <option value="data">data</option>
            </select>
          </div>
        </div>
        <div>
          <label>content</label>
          <textarea id="q-asset-content" rows="2">此资产通过测试界面快速导入，用于验证 Candidate Space 注入链路。</textarea>
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="ingestAsset()">
            <span class="badge badge-post" style="font-size:9px;">POST</span>
            /lios/assets/ingest
          </button>
          <button class="btn btn-ghost" onclick="reindexAssets()" style="width:auto;padding:8px 12px;flex-shrink:0;" title="重建索引（全租户）">⟳ reindex</button>
        </div>

      </div>
    </div>

  </div>

  <!-- ── Output pane ── -->
  <div class="output-pane" id="outputPane">
    <div class="empty" id="emptyState">
      <div class="icon">⬡</div>
      <p>点击左侧按钮发起请求<br>响应将在此显示</p>
    </div>
  </div>

</div>

<script>
const BASE = 'http://localhost:3210';
let reqCount = 0;

// ── JSON syntax highlight ──────────────────────────────────────────────────
function highlight(obj) {
  const s = JSON.stringify(obj, null, 2);
  return s.replace(
    /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m => {
      if (/^"/.test(m)) {
        if (/:$/.test(m)) return `<span class="j-key">${esc(m)}</span>`;
        return `<span class="j-str">${esc(m)}</span>`;
      }
      if (/true|false/.test(m)) return `<span class="j-bool">${m}</span>`;
      if (/null/.test(m))       return `<span class="j-null">${m}</span>`;
      return `<span class="j-num">${m}</span>`;
    }
  );
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Build output card ──────────────────────────────────────────────────────
function addResult({ method, url, status, ms, data, summary }) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const id = `res-${++reqCount}`;
  const stateColor = status >= 200 && status < 300 ? 'var(--green)' : 'var(--red)';
  const methodCls  = method === 'POST' ? 'method-post' : 'method-get';

  const card = document.createElement('div');
  card.className = 'card';
  card.id = id;

  card.innerHTML = `
    <div class="card-header">
      <div class="output-label">
        <span class="method-tag ${methodCls}">${method}</span>
        <span class="url-tag">${esc(url)}</span>
        ${summary ? `<span class="badge" style="background:var(--bg2);color:${stateColor};">${esc(summary)}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="timing">${ms}ms · HTTP ${status}</span>
        <button class="btn btn-icon" onclick="copyResult('${id}')" title="复制 JSON">⎘</button>
        <button class="btn btn-icon" onclick="this.closest('.card').remove()" title="关闭">✕</button>
      </div>
    </div>
    ${buildSummaryRow(data)}
    <div class="card-body">
      <div class="json-wrap" id="json-${id}">${highlight(data)}</div>
    </div>
  `;

  const pane = document.getElementById('outputPane');
  pane.insertBefore(card, pane.firstChild);
}

function buildSummaryRow(data) {
  const pairs = [];

  if (data.final_state)   pairs.push({ k:'final', v: data.final_state,
    cls: data.final_state==='accepted'?'green': data.final_state==='held'?'yellow':'red' });
  if (data.tenant_id)     pairs.push({ k:'tenant', v: data.tenant_id });
  if (data.trace_id)      pairs.push({ k:'trace', v: data.trace_id.slice(0,8)+'…' });
  if (data.result?.kernel) {
    pairs.push({ k:'score', v: data.result.kernel.score });
    pairs.push({ k:'verdict', v: data.result.kernel.verdict });
    pairs.push({ k:'evidence', v: data.result.kernel.evidence_summary.total });
    pairs.push({ k:'ledger', v: data.result.ledger_entries });
  }
  if (data.count !== undefined) pairs.push({ k:'count', v: data.count });
  if (data.plugins)  pairs.push({ k:'plugins', v: data.plugins.length });
  if (data.assets)   pairs.push({ k:'assets', v: data.assets.length });
  if (data.reindexed !== undefined) pairs.push({ k:'reindexed', v: data.reindexed });
  if (data.status)   pairs.push({ k:'status', v: data.status });
  if (data.output_role) {
    pairs.push({ k:'output_role', v: data.output_role,
      cls: data.output_role==='candidate'?'green':'yellow' });
  }

  if (!pairs.length) return '';

  return `<div class="summary">${
    pairs.map(p => `<div class="kv"><span class="k">${p.k}=</span><span class="v ${p.cls||''}">${p.v}</span></div>`).join('')
  }</div>`;
}

function copyResult(id) {
  const el = document.getElementById('json-' + id);
  navigator.clipboard?.writeText(el.innerText).catch(() => {});
}

// ── API helpers ───────────────────────────────────────────────────────────
async function api(method, path, body) {
  const url = BASE + path;
  const t0  = Date.now();
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    const ms  = Date.now() - t0;
    const data = await res.json();
    return { status: res.status, ms, data, url };
  } catch (err) {
    const ms = Date.now() - t0;
    return { status: 0, ms, data: { error: err.message }, url };
  }
}

// ── Health ────────────────────────────────────────────────────────────────
async function fetchHealth() {
  const dot  = document.getElementById('healthDot');
  const text = document.getElementById('healthText');
  const meta = document.getElementById('healthMeta');

  dot.className = 'dot pulse';
  text.textContent = '检查中…';

  const { status, ms, data } = await api('GET', '/health');

  if (status === 200 && data.status === 'ok') {
    dot.className = 'dot ok';
    text.textContent = `服务正常 · uptime ${data.uptime_s}s`;
    meta.textContent = `DB ${data.db.latency_ms}ms · ${data.timestamp?.slice(11,19)}`;
  } else {
    dot.className = 'dot error';
    text.textContent = '服务异常';
    meta.textContent = status ? `HTTP ${status}` : data.error;
  }
}

// ── /lios/run ─────────────────────────────────────────────────────────────
async function runLios() {
  const btn  = document.getElementById('btnRun');
  const icon = document.getElementById('runIcon');
  btn.disabled = true;
  icon.className = 'spinner';

  let ctx;
  try {
    ctx = JSON.parse(document.getElementById('f-context').value || '{}');
  } catch {
    ctx = {};
  }

  const score = document.getElementById('f-score').value;
  const l4    = document.getElementById('f-l4').value;
  if (score)        ctx._test_pack_score = parseFloat(score);
  if (l4 === 'true') ctx._test_force_l4  = true;

  const body = {
    tenant_id:  document.getElementById('f-tenant').value || 'default',
    intent:     document.getElementById('f-intent').value,
    session_id: document.getElementById('f-session').value || undefined,
    context:    ctx,
  };
  if (!body.session_id) delete body.session_id;

  const { status, ms, data, url } = await api('POST', '/lios/run', body);
  addResult({ method: 'POST', url, status, ms, data,
    summary: data.final_state });

  icon.className = '';
  icon.textContent = '▶';
  btn.disabled = false;
}

// ── Plugins ───────────────────────────────────────────────────────────────
async function testPlugins() {
  const tid = document.getElementById('q-tenant').value || 'acme';
  const { status, ms, data, url } = await api('GET', `/lios/plugins?tenant_id=${encodeURIComponent(tid)}`);
  addResult({ method: 'GET', url, status, ms, data });
}

async function testPluginInvoke() {
  const tid      = document.getElementById('q-tenant').value || 'acme';
  const pluginId = document.getElementById('q-plugin-id').value.trim();
  const prompt   = document.getElementById('q-plugin-prompt').value;

  if (!pluginId) { alert('请填写 Plugin ID'); return; }

  const { status, ms, data, url } =
    await api('POST', `/lios/plugins/${pluginId}/invoke`, {
      tenant_id: tid,
      input: { prompt },
    });
  addResult({ method: 'POST', url, status, ms, data });
}

// ── Assets ────────────────────────────────────────────────────────────────
async function testAssets() {
  const tid = document.getElementById('q-tenant').value || 'acme';
  const { status, ms, data, url } = await api('GET', `/lios/assets/search?tenant_id=${encodeURIComponent(tid)}`);
  addResult({ method: 'GET', url, status, ms, data });
}

async function ingestAsset() {
  const tid = document.getElementById('q-tenant').value || 'acme';
  const body = {
    tenant_id:  tid,
    name:       document.getElementById('q-asset-name').value,
    content:    document.getElementById('q-asset-content').value,
    asset_type: document.getElementById('q-asset-type').value,
    scope:      document.getElementById('q-asset-scope').value,
    scope_ref:  tid,
    tags:       ['ui-test'],
  };
  const { status, ms, data, url } = await api('POST', '/lios/assets/ingest', body);
  addResult({ method: 'POST', url, status, ms, data });
}

async function reindexAssets() {
  const tid = document.getElementById('q-tenant').value || 'acme';
  const { status, ms, data, url } = await api('POST', '/lios/assets/reindex', { tenant_id: tid });
  addResult({ method: 'POST', url, status, ms, data });
}

fetchHealth();
setInterval(fetchHealth, 30000);
